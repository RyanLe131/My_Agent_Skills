# OpenAI Agent Configuration for RAG Framework
# Use this as a reference for configuring GPT-based agents in RAG systems.

agent:
  name: rag-assistant
  description: >
    A retrieval-augmented generation assistant that answers questions
    grounded in a knowledge base. Uses vector search to retrieve relevant
    context before generating answers.

model:
  name: gpt-4o
  temperature: 0
  max_tokens: 4096
  top_p: 1.0

system_prompt_file: ../templates/system_prompt.txt

behavior:
  # Always ground answers in retrieved context
  grounding: strict
  # Say "I don't know" when context is insufficient
  abstention: true
  # Include source references in answers
  citations: true
  # Streaming for user-facing applications
  streaming: true

retrieval:
  embedding_model: text-embedding-3-small
  vector_store: chromadb
  top_k: 5
  similarity_threshold: 0.7
  reranking: false
  search_type: mmr  # similarity | mmr | hybrid

chunking:
  strategy: recursive
  chunk_size: 512
  chunk_overlap: 50

tools:
  - name: search_knowledge_base
    description: >
      Search the vector database for documents relevant to the user's question.
      Always call this before answering factual questions.
    parameters:
      query:
        type: string
        description: The search query derived from the user's question
      top_k:
        type: integer
        description: Number of results to retrieve (default 5)
      filters:
        type: object
        description: Optional metadata filters (e.g., category, date range)

  - name: ingest_document
    description: >
      Add a new document to the knowledge base. Handles chunking and embedding.
    parameters:
      content:
        type: string
        description: The document text to ingest
      metadata:
        type: object
        description: Document metadata (source, title, category, date)

  - name: evaluate_response
    description: >
      Check whether the generated answer is faithful to the retrieved context.
    parameters:
      answer:
        type: string
        description: The generated answer to evaluate
      context:
        type: string
        description: The retrieved context used for generation

guardrails:
  # Reject queries that attempt prompt injection
  input_validation: true
  # Verify answer is grounded in context before returning
  output_validation: true
  # Maximum context length in tokens
  max_context_tokens: 6000
  # Block PII in responses
  pii_filtering: false

monitoring:
  log_queries: true
  log_latency: true
  log_retrieval_scores: true
  log_token_usage: true
